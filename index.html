<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamexed | Developer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-content">
      
      <!-- Left side: Logo + Name -->
      <div class="logo-container">
        <img src="assets/images/logo.png" alt="Your Logo" class="logo-img">
        <span class="logo-name">Dynamexed</span>
      </div>

      <!-- Center Navigation -->
      <ul class="nav-links">
        <li><a href="#models">Models</a></li>
        <li><a href="#about">About Me</a></li>
      </ul>

      <!-- Right side: Social Links -->
      <div class="social-links">
        <a href="https://github.com/yourusername" target="_blank" title="Discord">
          <i class="fab fa-github"></i>
        </a>
    </div>
  </nav>

  <!-- Rest of your sections (Hero, About, etc.) -->
  <section id="hero" class="hero">
    <div class="hero-content">
      <h1>Hi, I'm <span class="highlight">Dynamexed</span></h1>
      <p class="subtitle">Full Stack Developer</p>
      <div class="hero-buttons">
        <a href="#models" class="btn primary">View My Models</a>
        <a href="#contact" class="btn secondary">Contact Me</a>
      </div>
    </div>
  </section>

  <!-- Add your other sections here: #models, #about, #contact etc. -->

  <script src="script.js"></script>
</body>
</html>
